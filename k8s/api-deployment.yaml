apiVersion: apps/v1
kind: Deployment
metadata:
  name: achievement-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: achievement-api
  template:
    metadata:
      labels:
        app: achievement-api
    spec:
      containers:
      - name: api
        image: achievement-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        env:
        # Environment variables from ConfigMap (individual values)
        - name: MONGODB_URL
          valueFrom:
            configMapKeyRef:
              name: achievement-api-config
              key: MONGODB_URL
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: achievement-api-config
              key: DATABASE_NAME
        # Secret value
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: secret-key
        volumeMounts:
        - name: uploads-storage
          mountPath: /app/uploads
      volumes:
      - name: uploads-storage
        persistentVolumeClaim:
          claimName: uploads-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
type: Opaque
stringData:
  secret-key: "your-very-secret-key-change-in-production"